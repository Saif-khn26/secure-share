<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Secure File Share - Upload</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-100 to-purple-200 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white shadow-2xl rounded-3xl p-10 max-w-md w-full">
    <h2 class="text-2xl font-bold text-purple-700 mb-6 text-center">🔐 Secure File Uploader</h2>

    <!-- Upload Form -->
    <form id="uploadForm" enctype="multipart/form-data" class="space-y-4">
      <input type="file" name="file" required class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100" />
      <input type="number" name="expire" placeholder="Expiry in hours" required class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400" />
      <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-2 rounded-lg transition">Upload 🔼</button>
    </form>

    <!-- Output -->
    <div id="linkResult" class="mt-6 text-sm text-green-700"></div>
  </div>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const formData = new FormData(this);

      const res = await fetch("upload.php", {
        method: "POST",
        body: formData
      });

      try {
        const result = await res.json();

        if (result.status === "success") {
          document.getElementById("linkResult").innerHTML = `
            <div class="bg-green-50 p-4 rounded-lg">
              <p class="mb-2"><strong>Download Link:</strong> 
                <a href="${result.link}" class="underline text-blue-700 break-all">${result.link}</a>
              </p>
              <p><strong>OTP:</strong> 
                <span class="text-purple-600 font-mono">${result.otp}</span>
              </p>
              <p class="text-gray-500 mt-2">Share this link and OTP securely.</p>
              <p><strong>Filename:</strong> ${result.filename}</p>
            </div>
          `;
        } else {
          document.getElementById("linkResult").innerHTML = `<p class="text-red-600">${result.message}</p>`;
        }
      } catch (err) {
        document.getElementById("linkResult").innerHTML = `<p class="text-red-600">Error: Unable to process request.</p>`;
      }
    });
  </script>
</body>
</html>
